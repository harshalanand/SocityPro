// ─── UI Primitives ────────────────────────────────────────────────────────────
const Badge = ({ label, color='blue', size='sm' }) => {
  const colors = {
    blue:'background:#1e3a5f;color:#4f9eff', green:'background:#14532d;color:#4ade80',
    red:'background:#450a0a;color:#f87171', orange:'background:#431407;color:#fb923c',
    yellow:'background:#422006;color:#facc15', gray:'background:#1f2937;color:#9ca3af',
    purple:'background:#2e1065;color:#c084fc'
  };
  const s = colors[color] || colors.blue;
  const sz = size === 'sm' ? 'font-size:11px;padding:2px 8px' : 'font-size:12px;padding:3px 10px';
  return <span style={{borderRadius:'20px',fontWeight:600,display:'inline-block',...Object.fromEntries(s.split(';').map(x=>x.split(':'))),fontSize:size==='sm'?'11px':'12px',padding:size==='sm'?'2px 8px':'3px 10px'}}>{label}</span>;
};

const statusBadge = (s) => {
  const map = {open:['open','red'],in_progress:['in progress','orange'],resolved:['resolved','green'],closed:['closed','gray'],
    paid:['paid','green'],pending:['pending','orange'],overdue:['overdue','red'],partial:['partial','yellow'],
    checked_in:['in','green'],checked_out:['out','gray'],active:['active','green'],maintenance:['maintenance','yellow']};
  const [label, color] = map[s] || [s, 'gray'];
  return <Badge label={label} color={color} />;
};

const Card = ({ children, style={}, className='' }) => (
  <div className={className} style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'20px',...style }}>{children}</div>
);

const StatCard = ({ label, value, sub, icon, trend, color='accent' }) => {
  const c = { accent:'#4f7cff', green:'#22c55e', red:'#ef4444', orange:'#f97316', purple:'#7c4fff' }[color];
  return (
    <div style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'20px',position:'relative',overflow:'hidden' }}>
      <div style={{ position:'absolute',top:0,right:0,width:80,height:80,borderRadius:'0 12px 0 80px',background:`${c}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24 }}>{icon}</div>
      <div style={{ color:'var(--text2)',fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:8 }}>{label}</div>
      <div style={{ fontSize:26,fontWeight:800,color:'var(--text)',marginBottom:4 }}>{value}</div>
      {sub && <div style={{ fontSize:12,color:'var(--text3)' }}>{sub}</div>}
      {trend !== undefined && <div style={{ fontSize:12,color:trend>=0?'var(--green)':'var(--red)',marginTop:4,fontWeight:600 }}>{trend>=0?'↑':'↓'} {Math.abs(trend)}% vs last month</div>}
    </div>
  );
};

const Button = ({ children, onClick, variant='primary', size='md', disabled=false, style={} }) => {
  const variants = {
    primary:{ background:'var(--accent)',color:'#fff',border:'none' },
    secondary:{ background:'var(--surface3)',color:'var(--text)',border:'1px solid var(--border)' },
    danger:{ background:'var(--red)',color:'#fff',border:'none' },
    ghost:{ background:'transparent',color:'var(--text2)',border:'none' },
    success:{ background:'var(--green)',color:'#fff',border:'none' },
  };
  const sizes = { sm:{ fontSize:12,padding:'6px 12px' }, md:{ fontSize:13,padding:'9px 16px' }, lg:{ fontSize:14,padding:'11px 20px' } };
  return (
    <button onClick={onClick} disabled={disabled} style={{ ...variants[variant],...sizes[size],borderRadius:'var(--radius-sm)',cursor:disabled?'not-allowed':'pointer',fontFamily:'inherit',fontWeight:600,opacity:disabled?0.5:1,transition:'all 0.15s',...style }}>
      {children}
    </button>
  );
};

const Input = ({ label, value, onChange, type='text', placeholder='', required=false, style={} }) => (
  <div style={{ marginBottom:14 }}>
    {label && <label style={{ display:'block',fontSize:12,fontWeight:600,color:'var(--text2)',marginBottom:6,textTransform:'uppercase',letterSpacing:0.5 }}>{label}{required&&<span style={{color:'var(--red)'}}> *</span>}</label>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{ width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none',...style }} />
  </div>
);

const Select = ({ label, value, onChange, options, required=false }) => (
  <div style={{ marginBottom:14 }}>

    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{ width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'9px 12px',color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none' }}>
      {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);

const Modal = ({ open, onClose, title, children, width=520 }) => {
  if (!open) return null;
  return (
    <div style={{ position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(4px)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20 }}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',width:'100%',maxWidth:width,maxHeight:'90vh',overflow:'auto' }}>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 24px',borderBottom:'1px solid var(--border)' }}>
          <h3 style={{ fontSize:16,fontWeight:700 }}>{title}</h3>
          <button onClick={onClose} style={{ background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:20,lineHeight:1 }}>×</button>
        </div>
        <div style={{ padding:'24px' }}>{children}</div>
      </div>
    </div>
  );
};

const Toast = ({ message, type='success', onClose }) => {
  useEffect(() => { const t = setTimeout(onClose, 3000); return ()=>clearTimeout(t); }, []);
  const colors = { success:'#22c55e', error:'#ef4444', info:'#4f7cff' };
  return (
    <div style={{ position:'fixed',bottom:24,right:24,zIndex:9999,background:'var(--surface)',border:`1px solid ${colors[type]}`,borderLeft:`4px solid ${colors[type]}`,borderRadius:'var(--radius-sm)',padding:'12px 16px',color:'var(--text)',fontSize:13,fontWeight:500,boxShadow:'var(--shadow)',maxWidth:360,animation:'slideIn 0.2s ease' }}>
      {message}
    </div>
  );
};

const Table = ({ columns, data, onRowClick }) => (
  <div style={{ overflowX:'auto' }}>
    <table style={{ width:'100%',borderCollapse:'collapse',fontSize:13 }}>
      <thead>
        <tr>{columns.map(c=><th key={c.key} style={{ padding:'10px 14px',textAlign:'left',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:0.5,color:'var(--text3)',borderBottom:'1px solid var(--border)' }}>{c.label}</th>)}</tr>
      </thead>
      <tbody>
        {data.length===0?<tr><td colSpan={columns.length} style={{textAlign:'center',padding:32,color:'var(--text3)'}}>No data found</td></tr>:
        data.map((row,i)=>(
          <tr key={i} onClick={()=>onRowClick&&onRowClick(row)} style={{ borderBottom:'1px solid var(--border)',cursor:onRowClick?'pointer':'default',transition:'background 0.1s' }}
            onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            {columns.map(c=><td key={c.key} style={{ padding:'12px 14px' }}>{c.render?c.render(row[c.key],row):row[c.key]??'-'}</td>)}
          </tr>
        ))}
      </tbody>
    </table>
  </div>
);

const PollsPage = () => {
  const [polls, setPolls] = useState([
    {id:1,title:"Preferred time for water supply maintenance",options:["Morning 6-8 AM","Afternoon 2-4 PM","Evening 6-8 PM"],votes:[12,8,15],total_votes:35,is_active:true,user_voted:false},

  const { toast } = useApp();

  const handleVote = (pollId, optIdx) => {
    setPolls(p=>p.map(pl=>pl.id===pollId?{...pl,user_voted:true,total_votes:pl.total_votes+1,votes:pl.votes.map((v,i)=>i===optIdx?v+1:v)}:pl));
    toast('Vote recorded!');
  };

  return (
    <div style={{ padding:24,overflowY:'auto',flex:1 }} className="scrollbar">
      <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20 }}>

        <Button>+ Create Poll</Button>
      </div>
      <div style={{ display:'grid',gap:16 }}>
        {polls.map(p=>(
          <Card key={p.id}>
            <div style={{ display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14 }}>
              <h3 style={{ fontSize:15,fontWeight:700,flex:1,marginRight:16 }}>{p.title}</h3>
              <Badge label={p.is_active?'Active':'Closed'} color={p.is_active?'green':'gray'} />
            </div>
            <div style={{ display:'grid',gap:8 }}>
              {p.options.map((opt,i)=>{
                const pct = p.total_votes>0?Math.round(p.votes[i]/p.total_votes*100):0;
                return (
                  <div key={i} style={{ position:'relative',overflow:'hidden' }}>
                    <div style={{ position:'absolute',left:0,top:0,bottom:0,width:`${pct}%`,background:'var(--accent-glow)',borderRadius:'var(--radius-sm)',transition:'width 0.5s' }}/>
                    <div style={{ position:'relative',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',cursor:(!p.user_voted&&p.is_active)?'pointer':'default' }}
                      onClick={()=>!p.user_voted&&p.is_active&&handleVote(p.id,i)}>
                      <span style={{ fontSize:13 }}>{opt}</span>
                      <div style={{ display:'flex',alignItems:'center',gap:8,flexShrink:0 }}>
                        <span style={{ fontSize:12,color:'var(--text3)' }}>{p.votes[i]} votes</span>
                        <span style={{ fontSize:13,fontWeight:700,color:'var(--accent)',minWidth:36,textAlign:'right' }}>{pct}%</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ marginTop:10,fontSize:12,color:'var(--text3)' }}>Total: {p.total_votes} votes {p.user_voted&&'• You voted'}</div>
          </Card>
        ))}
      </div>
    </div>
  );
};

        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{ width:'100%',display:'flex',alignItems:'center',gap:8,padding:'9px 12px',borderRadius:'var(--radius-sm)',border:'none',background:tab===t.id?'var(--accent-glow)':'transparent',color:tab===t.id?'var(--accent)':'var(--text2)',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:tab===t.id?700:500,marginBottom:2,textAlign:'left' }}>

      {/* Settings Content */}
      <div style={{ flex:1,overflowY:'auto',padding:24 }} className="scrollbar">
        {tab==='general' && <>
          <SectionTitle>Application Settings</SectionTitle>
          <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:12 }}>
            <Input label="Application Name" value={s('app_name')} onChange={v=>set('app_name',v)} />

            <Select label="Timezone" value={s('timezone')} onChange={v=>set('timezone',v)} options={['Asia/Kolkata','America/New_York','Europe/London','Asia/Singapore'].map(o=>({value:o,label:o}))} />
            <Select label="Date Format" value={s('date_format')} onChange={v=>set('date_format',v)} options={['DD/MM/YYYY','MM/DD/YYYY','YYYY-MM-DD'].map(o=>({value:o,label:o}))} />
          </div>
        </>}
        {tab==='billing' && <>
          <SectionTitle>Billing Configuration</SectionTitle>
          <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:12 }}>
            <Input label="Maintenance Due Day" value={s('maintenance_due_day')} onChange={v=>set('maintenance_due_day',v)} type="number" />
            <Input label="Late Fee %" value={s('late_fee_percent')} onChange={v=>set('late_fee_percent',v)} type="number" />
            <Input label="Penalty Grace Days" value={s('penalty_grace_days')} onChange={v=>set('penalty_grace_days',v)} type="number" />

        {tab==='notifications' && <>

          <Toggle label="SMS Notifications" desc="Send SMS for payment reminders and alerts" k="sms_enabled" />

          <Toggle label="WhatsApp Notifications" desc="Send WhatsApp messages for all notifications" k="whatsapp_enabled" />

            <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:12,alignItems:'end' }}>

            </div>

        {tab==='sms' && <>

            <Input label="Twilio Account SID" value={s('twilio_account_sid')} onChange={v=>set('twilio_account_sid',v)} placeholder="ACxxxxxxxx" />
            <Input label="Twilio Auth Token" value={s('twilio_auth_token')} onChange={v=>set('twilio_auth_token',v)} type="password" />
            <Input label="From Number" value={s('twilio_from_number')} onChange={v=>set('twilio_from_number',v)} placeholder="+1234567890" />
          </>}
          {s('sms_provider')==='msg91'&&<Input label="MSG91 Auth Key" value={s('msg91_auth_key')||''} onChange={v=>set('msg91_auth_key',v)} type="password" />}

        {tab==='email' && <>
          <SectionTitle>Email Configuration</SectionTitle>
          <Select label="Email Provider" value={s('email_provider')} onChange={v=>set('email_provider',v)} options={[{value:'smtp',label:'SMTP'},{value:'sendgrid',label:'SendGrid'}]} />
          {s('email_provider')==='sendgrid'&&<Input label="SendGrid API Key" value={s('sendgrid_api_key')} onChange={v=>set('sendgrid_api_key',v)} type="password" placeholder="SG.xxxxx" />}
          {s('email_provider')==='smtp'&&<>
            <div style={{ display:'grid',gridTemplateColumns:'2fr 1fr',gap:12 }}>
              <Input label="SMTP Host" value={s('smtp_host')} onChange={v=>set('smtp_host',v)} placeholder="smtp.gmail.com" />

            <Input label="SMTP Username" value={s('smtp_username')} onChange={v=>set('smtp_username',v)} />
            <Input label="SMTP Password" value={s('smtp_password')} onChange={v=>set('smtp_password',v)} type="password" />
          </>}
          <Input label="From Email" value={s('email_from')} onChange={v=>set('email_from',v)} type="email" />
        </>}
        {tab==='whatsapp' && <>
          <SectionTitle>WhatsApp Configuration</SectionTitle>
          <Select label="Provider" value={s('whatsapp_provider')} onChange={v=>set('whatsapp_provider',v)} options={[{value:'twilio',label:'Twilio'},{value:'wati',label:'WATI'},{value:'gupshup',label:'Gupshup'}]} />
          <Input label="WhatsApp From Number" value={s('whatsapp_from')} onChange={v=>set('whatsapp_from',v)} placeholder="+91xxxxxxxxxx" />
          {s('whatsapp_provider')==='wati'&&<>

        {tab==='database' && <>

          {s('db_type')==='mssql'&&<>
            <Input label="Server Address" value={s('mssql_server')} onChange={v=>set('mssql_server',v)} placeholder="localhost\\SQLEXPRESS or server:1433" />
            <Input label="Database Name" value={s('mssql_database')} onChange={v=>set('mssql_database',v)} />
            <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:12 }}>
              <Input label="Username" value={s('mssql_username')} onChange={v=>set('mssql_username',v)} />
              <Input label="Password" value={s('mssql_password')} onChange={v=>set('mssql_password',v)} type="password" />
            </div>
          </>}
          <div style={{ display:'flex',gap:10,marginTop:8 }}>
            <Button variant="secondary" onClick={handleDbTest}>{dbTest?.testing?'Testing...':'Test Connection'}</Button>
            {dbTest && !dbTest.testing && <div style={{ display:'flex',alignItems:'center',gap:8,fontSize:13,color:dbTest.success?'var(--green)':'var(--red)' }}>
              {dbTest.success?'✅':'❌'} {dbTest.message}

          </div>
          <div style={{ marginTop:16,padding:'14px',background:'var(--surface2)',borderRadius:'var(--radius-sm)',fontSize:12,color:'var(--text3)' }}>
            🔄 After switching to MSSQL, run data migration using: <code style={{fontFamily:'JetBrains Mono',color:'var(--accent)'}}>python migrate.py --from sqlite --to mssql</code>
          </div>
        </>}
        {tab==='security' && <>
          <SectionTitle>Security Settings</SectionTitle>
          <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16 }}>
            <Input label="Session Timeout (minutes)" value={s('session_timeout_minutes')} onChange={v=>set('session_timeout_minutes',v)} type="number" />
            <Input label="Min Password Length" value={s('password_min_length')} onChange={v=>set('password_min_length',v)} type="number" />
          </div>
          <Toggle label="Require OTP for Login" desc="Users must verify via OTP in addition to password" k="require_otp_login" />
          <div style={{ marginTop:20 }}>
            <SectionTitle>Active Sessions</SectionTitle>

        <div style={{ marginTop:24,paddingTop:16,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end',gap:10 }}>

          <Button onClick={handleSave}>Save Settings</Button>
        </div>
      </div>
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const PAGE_TITLES = {
  dashboard:'Dashboard',societies:'Societies',users:'User Management',billing:'Billing',
  transactions:'Financial Ledger',complaints:'Complaints',visitors:'Visitor Management',
  announcements:'Announcements',assets:'Asset Management',vendors:'Vendors',budget:'Budget Planning',
  polls:'Polls & Voting',reports:'Reports',audit:'Audit Log',settings:'Settings',
};

function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [societies] = useState(MOCK_SOCIETIES);
  const [currentSociety, setCurrentSociety] = useState(null);

  const toast = (message, type='success') => {
    const id = Date.now();
    setToasts(p=>[...p,{id,message,type}]);
  };
  const removeToast = (id) => setToasts(p=>p.filter(t=>t.id!==id));

  if (!user) return (
    <AppCtx.Provider value={{ toast }}>
      <LoginPage onLogin={u=>setUser(u)} />
      {toasts.map(t=><Toast key={t.id} {...t} onClose={()=>removeToast(t.id)} />)}
    </AppCtx.Provider>
  );

  const pages = { dashboard:<DashboardPage society={currentSociety}/>, societies:<SocietiesPage/>, users:<UsersPage/>, billing:<BillingPage/>, transactions:<TransactionsPage/>, complaints:<ComplaintsPage/>, visitors:<VisitorsPage/>, announcements:<AnnouncementsPage/>, assets:<AssetsPage/>, vendors:<VendorsPage/>, budget:<BudgetPage/>, polls:<PollsPage/>, reports:<ReportsPage/>, audit:<AuditPage/>, settings:<SettingsPage/> };

  return (
    <AppCtx.Provider value={{ toast, user, societies, currentSociety }}>
      <style>{`@keyframes slideIn { from { transform:translateX(20px);opacity:0; } to { transform:translateX(0);opacity:1; } }`}</style>
      <Sidebar page={page} setPage={setPage} user={user} collapsed={collapsed} setCollapsed={setCollapsed} />
      <div style={{ flex:1,display:'flex',flexDirection:'column',overflow:'hidden' }}>
        <Header title={PAGE_TITLES[page]} user={user} onLogout={()=>setUser(null)} societies={societies} currentSociety={currentSociety} onSocietyChange={setCurrentSociety} />
        <div style={{ flex:1,overflow:'hidden',display:'flex' }}>
          {pages[page] || <div style={{ padding:24 }}>Page not found</div>}
        </div>
      </div>
      {toasts.map(t=><Toast key={t.id} {...t} onClose={()=>removeToast(t.id)} />)}
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
