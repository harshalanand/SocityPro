version: "3.9"

services:
  # в”Ђв”Ђ Backend (FastAPI) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: societypro-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DB_TYPE=${DB_TYPE:-sqlite}
      - SQLITE_PATH=/data/societypro.db
      - MSSQL_SERVER=${MSSQL_SERVER:-}
      - MSSQL_DATABASE=${MSSQL_DATABASE:-}
      - MSSQL_USERNAME=${MSSQL_USERNAME:-}
      - MSSQL_PASSWORD=${MSSQL_PASSWORD:-}
      - SMS_PROVIDER=${SMS_PROVIDER:-twilio}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-smtp}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@societypro.com}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-twilio}
      - WHATSAPP_FROM=${WHATSAPP_FROM:-}
    volumes:
      - backend_data:/data
      - backend_uploads:/app/uploads
    networks:
      - societypro

  # в”Ђв”Ђ Frontend (Nginx serving React build) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: societypro-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - societypro

  # в”Ђв”Ђ Redis (optional вЂ” enable for Celery background jobs) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # redis:
  #   image: redis:7-alpine
  #   container_name: societypro-redis
  #   restart: unless-stopped
  #   networks:
  #     - societypro

volumes:
  backend_data:
  backend_uploads:

networks:
  societypro:
    driver: bridge
